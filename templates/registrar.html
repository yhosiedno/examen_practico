{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">

        <div class="card shadow-lg">
            <div class="card-header text-center">
                <h4>Registrar Producto</h4>
            </div>

            <div class="card-body">

                <form method="POST">

                    <input class="form-control mb-3" name="nombre" placeholder="Nombre" required>
                    <input class="form-control mb-3" name="categoria" placeholder="Categoría" required>
                    <input class="form-control mb-3" type="number" step="0.01" name="precio" placeholder="Precio" required>
                    <input class="form-control mb-3" type="number" name="stock" placeholder="Stock" required>

                    <button class="btn btn-success w-100">
                        <i class="bi bi-save"></i> Guardar
                    </button>

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
